name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pyright

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Type check (pyright)
        run: pyright app

      - name: Test (pytest)
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    needs: lint-type-test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t orkoprox:ci .

      - name: Image self-smoke
        run: |
          docker run -d --name orkoprox-ci -p 8091:8091 \
            -e PROXY_AUTH_REQUIRED=false \
            -e PRIMARY_PROVIDER=stub -e DEFAULT_PROVIDER=stub \
            -e FALLBACK_PROVIDERS=stub -e GUARD_ENABLED=false \
            -e RERANKER_ENABLED=false \
            orkoprox:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8091/health >/dev/null 2>&1; then
              echo "health OK"; break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8091/health
          docker rm -f orkoprox-ci

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: orkoprox:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
